name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22 
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci

      - name: 🏗️ Build Application
        run: npm run build
        env:
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}

      - name: 🛠️ Ensure SPA Routing Fallback
        run: |
          if [ ! -f build/client/404.html ]; then
            echo "Custom 404.html not found, fallback to index.html"
            cp build/client/index.html build/client/404.html
          else
            echo "Custom 404.html detected! Preserving your SPA redirect script."
          fi

      - name: 🔧 Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload deployment artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build/client'

      - name: 💕 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4