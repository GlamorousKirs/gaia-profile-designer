<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Gaia Profile Designer Router Linker</title>
    <script type="text/javascript">
      // Segment single page router redirect mechanism logic
      var pathSegmentsToKeep = 1; 

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?_p=' +
        encodeURIComponent(l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/') + l.search + l.hash)
      );
    </script>
  </head>
  <body>
  </body>
</html>
